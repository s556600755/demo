<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bmi.css">
</head>
<body>
    <div class="container">
        <h1>BMI 健康計算器</h1>
        <p>請輸入您的身高與體重，了解您的身體質量指數。</p>

        <div class="input-group">
            <label for="height">身高 (cm):</label>
            <input type="number" class="height" placeholder="例如：175" step="0.1">
        </div>

        <div class="input-group">
            <label for="weight">體重 (kg):</label>
            <input type="number" class="weight" placeholder="例如：70" step="0.1">
        </div>

        <button  class="count" >開始計算</button>

        <div class="result-display" class="result">
            請輸入數值後點擊計算
        </div>
        <div class="output">
            
        </div>
    </div>
    
    


<script src="bmi.js"></script>
</body>
</html>
